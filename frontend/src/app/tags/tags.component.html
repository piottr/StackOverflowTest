<p-table [value]="tags" [loading]="loading" [paginator]="true" [rows]="10">
  <ng-template pTemplate="header">
    <tr>
      <th>Name</th>
      <th>Count</th>
      <th>Percentage</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-tag>
    <tr>
      <td>{{ tag.name }}</td>
      <td>{{ tag.count }}</td>
      <td>{{ tag.percentage }}%</td>
    </tr>
  </ng-template>
</p-table>
